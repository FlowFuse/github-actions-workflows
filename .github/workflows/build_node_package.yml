name: Build and test npm package

on:
  workflow_call:
    inputs:
      node:
        description: 'JSON array of Node.js versions and parameters'
        required: false
        type: string
        default: '[{"version": "24", "tests": true, "lint": true}]'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
          node: ${{ fromJson(inputs.node)}}
    name: Build on ${{ matrix.node.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js ${{ matrix.node.version}}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node.version }}
  
      - name: Install Dependencies
        run: npm ci
  
      - name: Run lint
        if: ${{ fromJson(matrix.node.lint) }}
        run: npm run lint
  
      - name: Run tests
        if: ${{ fromJson(matrix.node.tests) }}
        run: npm run test
