name: Build and test npm package

on:
  workflow_call:
    inputs:
      node:
        description: 'JSON array of Node.js versions and parameters'
        required: false
        type: string
        default: '[{"version": "24", "tests": true, "lint": true}]'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
          node: ${{ fromJson(inputs.node)}}
    name: Build on ${{ matrix.node.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Use Node.js ${{ matrix.node.version}}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node.version }}
  
      - name: Install Dependencies
        run: npm ci
  
      - name: Run lint
        if: ${{ fromJson(matrix.node.lint) }}
        run: npm run lint
  
      - name: Run tests
        if: ${{ fromJson(matrix.node.tests) }}
        run: npm run test
